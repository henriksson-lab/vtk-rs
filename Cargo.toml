[workspace]
members = [
    "crates/vtk-types",
    "crates/vtk-data",
    "crates/vtk-io-legacy",
    "crates/vtk-io-stl",
    "crates/vtk-io-obj",
    "crates/vtk-filters",
    "crates/vtk-render",
    "crates/vtk-render-wgpu",
    "crates/vtk-io-xml",
    "crates/vtk-io-ply",
]
resolver = "2"

[workspace.dependencies]
vtk-types = { path = "crates/vtk-types" }
vtk-data = { path = "crates/vtk-data" }
vtk-filters = { path = "crates/vtk-filters" }
vtk-render = { path = "crates/vtk-render" }
vtk-io-legacy = { path = "crates/vtk-io-legacy" }
vtk-io-stl = { path = "crates/vtk-io-stl" }
vtk-io-obj = { path = "crates/vtk-io-obj" }
vtk-render-wgpu = { path = "crates/vtk-render-wgpu" }
vtk-io-xml = { path = "crates/vtk-io-xml" }
vtk-io-ply = { path = "crates/vtk-io-ply" }
thiserror = "2"
bytemuck = { version = "1", features = ["derive"] }
glam = "0.29"
wgpu = "24"
winit = "0.30"
pollster = "0.4"

[package]
name = "vtk-rs-examples"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
vtk-data = { workspace = true }
vtk-filters = { workspace = true }
vtk-io-legacy = { workspace = true }
vtk-io-stl = { workspace = true }
vtk-io-obj = { workspace = true }
vtk-render = { workspace = true }
vtk-render-wgpu = { workspace = true }
winit = { workspace = true }
pollster = { workspace = true }

[[example]]
name = "triangle"
path = "examples/triangle.rs"

[[example]]
name = "shapes"
path = "examples/shapes.rs"

[[example]]
name = "isosurface"
path = "examples/isosurface.rs"

[[example]]
name = "scalar_colors"
path = "examples/scalar_colors.rs"
