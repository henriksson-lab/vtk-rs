[workspace]
members = [
    "crates/vtk-types",
    "crates/vtk-data",
    "crates/vtk-io-legacy",
    "crates/vtk-io-stl",
    "crates/vtk-io-obj",
    "crates/vtk-filters",
    "crates/vtk-render",
    "crates/vtk-render-wgpu",
    "crates/vtk-io-xml",
    "crates/vtk-io-ply",
    "crates/vtk-io-gltf",
    "crates/vtk-io-ensight",
    "crates/vtk-io-xdmf",
    "crates/vtk-io-off",
    "crates/vtk-io-dxf",
    "crates/vtk-io-geojson",
    "crates/vtk-io-csv",
    "crates/vtk-io-byu",
    "crates/vtk-io-las",
    "crates/vtk-io-facet",
    "crates/vtk-io-segy",
    "crates/vtk-io-tecplot",
    "crates/vtk-io-fits",
    "crates/vtk-python",
    "crates/vtk",
]
resolver = "2"

[workspace.dependencies]
vtk-types = { path = "crates/vtk-types" }
vtk-data = { path = "crates/vtk-data" }
vtk-filters = { path = "crates/vtk-filters" }
vtk-render = { path = "crates/vtk-render" }
vtk-io-legacy = { path = "crates/vtk-io-legacy" }
vtk-io-stl = { path = "crates/vtk-io-stl" }
vtk-io-obj = { path = "crates/vtk-io-obj" }
vtk-render-wgpu = { path = "crates/vtk-render-wgpu" }
vtk-io-xml = { path = "crates/vtk-io-xml" }
vtk-io-ply = { path = "crates/vtk-io-ply" }
vtk-io-gltf = { path = "crates/vtk-io-gltf" }
vtk-io-ensight = { path = "crates/vtk-io-ensight" }
vtk-io-xdmf = { path = "crates/vtk-io-xdmf" }
vtk-io-off = { path = "crates/vtk-io-off" }
vtk-io-dxf = { path = "crates/vtk-io-dxf" }
vtk-io-geojson = { path = "crates/vtk-io-geojson" }
vtk-io-csv = { path = "crates/vtk-io-csv" }
vtk-io-byu = { path = "crates/vtk-io-byu" }
vtk-io-las = { path = "crates/vtk-io-las" }
vtk-io-facet = { path = "crates/vtk-io-facet" }
vtk-io-segy = { path = "crates/vtk-io-segy" }
vtk-io-tecplot = { path = "crates/vtk-io-tecplot" }
vtk-io-fits = { path = "crates/vtk-io-fits" }
pyo3 = { version = "0.23", features = ["extension-module"] }
rayon = "1.10"
proptest = "1"
thiserror = "2"
bytemuck = { version = "1", features = ["derive"] }
glam = "0.29"
wgpu = "24"
winit = "0.30"
pollster = "0.4"

[package]
name = "vtk-rs-examples"
version = "0.1.0"
edition = "2021"
publish = false
autobenches = false

[dependencies]
vtk-data = { workspace = true }
vtk-filters = { workspace = true }
vtk-io-legacy = { workspace = true }
vtk-io-stl = { workspace = true }
vtk-io-obj = { workspace = true }
vtk-io-xml = { workspace = true }
vtk-io-ply = { workspace = true }
vtk-io-gltf = { workspace = true }
vtk-render = { workspace = true }
vtk-render-wgpu = { workspace = true }
winit = { workspace = true }
pollster = { workspace = true }

[[example]]
name = "triangle"
path = "examples/triangle.rs"

[[example]]
name = "shapes"
path = "examples/shapes.rs"

[[example]]
name = "isosurface"
path = "examples/isosurface.rs"

[[example]]
name = "scalar_colors"
path = "examples/scalar_colors.rs"

[[example]]
name = "pipeline_demo"
path = "examples/pipeline_demo.rs"

[[example]]
name = "showcase"
path = "examples/showcase.rs"

[[example]]
name = "volume"
path = "examples/volume.rs"

[[example]]
name = "mesh_info"
path = "examples/mesh_info.rs"

[[example]]
name = "headless_render"
path = "examples/headless_render.rs"

[[example]]
name = "bench_filters"
path = "benches/filters.rs"
